<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product — Smile Cleaning Products</title>
  <link rel="stylesheet" href="newdesign.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="nav-left">
      <a href="home.html" style="display:flex;align-items:center;gap:10px;">
        <img src="smilelogo.jpg" alt="logo" class="logo" />
        <div class="logo-text">SMILE</div>
      </a>
      <div id="user-banner" class="user-banner-inline"></div>
    </div>

    <div class="hamburger" onclick="toggleMenu()">
      <i class="fas fa-bars"></i>
    </div>

    <nav class="nav-right" id="navMenu">
      <a class="nav-item" href="home.html"><i class="fas fa-home"></i><span>Home</span></a>
      <a class="nav-item" href="product.html"><i class="fas fa-box-open"></i><span>Items</span></a>
      <a class="nav-item" href="aboutus.html"><i class="fas fa-info-circle"></i><span>About</span></a>
      <a class="nav-item" href="contactus.html"><i class="fas fa-envelope"></i><span>Contact</span></a>
      <a class="nav-item" href="carticon.html"><i class="fas fa-shopping-cart"></i><span>Cart</span></a>
      <a id="nav-signin" class="nav-item" href="signin.html"><i class="fas fa-user-plus"></i><span>Sign In</span></a>
      <a id="nav-login" class="nav-item" href="login.html"><i class="fas fa-lock"></i><span>Log In</span></a>
    </nav>
  </header>

  <!-- Mobile menu -->
  <div class="mobile-menu" id="mobileMenu" style="display:none;">
    <a href="home.html">Home</a>
    <a href="product.html">Items</a>
    <a href="aboutus.html">About</a>
    <a href="contactus.html">Contact</a>
    <a href="carticon.html">Cart</a>
    <a href="signin.html">Sign In</a>
    <a href="login.html">Log In</a>
  </div>

  <!-- MAIN CONTENT -->
  <main class="container main-content">
    <h1 class="section-title">Your Cart</h1>

    <!-- Cart items -->
    <section class="cart-section"></section>

<!-- Cart summary -->
<div class="cart-summary-container">
  <div class="cart-summary">
    <span id="cart-total">Total: Rs. 0</span>
    <button id="checkout-btn" onclick="document.getElementById('checkout-form').scrollIntoView({behavior:'smooth'})">
      Proceed to Checkout
    </button>
  </div>
</div>

<!-- Checkout Section -->
<h2 class="section-title" style="margin-top:40px;">Checkout</h2>
<div class="checkout-card">
  <form id="checkout-form" class="checkout-form">
    <div class="form-group">
      <label for="full-name">Full Name</label>
      <input id="full-name" type="text" placeholder="John Doe" required />
    </div>

    <div class="form-group">
      <label for="address">Address</label>
      <textarea id="address" rows="3" placeholder="Street, City, ZIP" required></textarea>
    </div>

    <div class="form-group">
      <label for="payment-method">Payment Method</label>
      <select id="payment-method" required>
        <option value="cod">Cash on Delivery</option>
        <option value="bkash">ESEWA,KHALTI(example)</option>
      </select>
    </div>

    <button type="submit" class="btn-submit">Place Order</button>
  </form>
</div>

  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-content">
      <h3 class="footer-title">Smile Cleaning Products</h3>

      <ul class="footer-links">
        <li><a href="home.html">Home</a></li>
        <li><a href="aboutus.html">About Us</a></li>
        <li><a href="contactus.html">Contact</a></li>
        <li><a href="product.html">Products</a></li>
      </ul>

      <div class="footer-icons">
        <a href="#"><i class="fa-brands fa-facebook"></i></a>
        <a href="#"><i class="fa-brands fa-instagram"></i></a>
        <a href="#"><i class="fa-brands fa-tiktok"></i></a>
      </div>

      <p class="footer-bottom">© 2025 Smile Cleaning Products — All Rights Reserved.</p>
    </div>
  </footer>

  <script src="main.js"></script>
</body>
</html>
