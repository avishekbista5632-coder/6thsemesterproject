<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Product Detail Page</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section class="background">
      <div class="container">
        <!-- Navigation -->
        <nav class="nav-menu">
          <div class="nav-left">
            <a class="nav-item" href="home.html">
              <span class="emoji-icon">🏠</span><span>Home</span>
            </a>
            <a class="nav-item" href="product.html">
              <span class="emoji-icon">🛍️</span><span>Item</span>
            </a>
            <a class="nav-item" href="aboutus.html">
              <span class="emoji-icon">ℹ️</span><span>About Us</span>
            </a>
            <a class="nav-item" href="contactus.html">
              <span class="emoji-icon">📲</span><span>Contact Us</span>
            </a>
            <a class="nav-item" href="signin.html" id="nav-signin">
              <span class="emoji-icon">✍️</span><span>Sign In</span>
            </a>
            <a class="nav-item" href="login.html" id="nav-login">
              <span class="emoji-icon">🔐</span><span>Log In</span>
            </a>
          </div>
          <div class="nav-right">
            <a class="nav-item" href="carticon.html">
              <span class="emoji-icon">🛒</span><span>Cart</span>
            </a>
          </div>
        </nav>
        <!-- Banner -->
        <section class="banner banner-custom">
          <img
            class="happy"
            src="picturesinthecode/smilelogo.jpg"
            alt="Happy Banner"
          />
          <!-- User info container -->
          <div id="user-banner" style="font-weight: bold;"></div>
        </section>
    <!-- Product Detail Section -->
    <section id="product-detail" class="product-detail"></section>
    <!-- Footer -->
    <footer class="footer">
      <strong>Order and Inquiry</strong><br /><br />
      9841190764<br /><br /><br />
      <strong>Follow us</strong>
      <div class="social-icons">
        <a href="https://facebook.com" target="_blank">
          <img
            src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/facebook.svg"
            alt="Facebook Icon"
          />
        </a>
        <a href="https://instagram.com" target="_blank">
          <img
            src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/instagram.svg"
            alt="Instagram Icon"
          />
        </a>
      </div>
    </footer>
    <!-- Modal for Image Gallery -->
    <div id="galleryModal" class="modal" onclick="closeGallery()">
      <div class="modal-controls">
        <span onclick="prevImage(event)">&#60;</span>
        <span onclick="nextImage(event)">&#62;</span>
      </div>
      <div class="modal-content">
        <img id="modalImage" src="" alt="Gallery Image" />
      </div>
    </div>
    <!-- JS Script -->
    <script src="main.js"></script>
  </body>
</html>
