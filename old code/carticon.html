<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>cart icon Page</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section class="background">
      <div class="container">
        <!-- Navigation -->
        <nav class="nav-menu">
          <!-- Left Side -->
          <div class="nav-left">
            <a class="nav-item" href="home.html">
              <span class="emoji-icon">🏠</span>
              <span>Home</span>
            </a>
            <a class="nav-item" href="product.html">
              <span class="emoji-icon">🛍️</span>
              <span>Item</span>
            </a>
            <a class="nav-item" href="aboutus.html">
              <span class="emoji-icon">ℹ️</span>
              <span>About Us</span>
            </a>
            <a class="nav-item" href="contactus.html">
              <span class="emoji-icon">📲</span>
              <span>Contact Us</span>
            </a>
<a class="nav-item" href="signin.html" id="nav-signin">
  <span class="emoji-icon">✍️</span>
  <span>Sign In</span>
</a>
<a class="nav-item" href="login.html" id="nav-login">
  <span class="emoji-icon">🔐</span>
  <span>Log In</span>
</a>
          </div>
          <!-- Right Side (Cart) -->
          <div class="nav-right">
            <a class="nav-item" href="carticon.html">
              <span class="emoji-icon">🛒</span>
              <span>Cart</span>
            </a>
          </div>
        </nav>

        <!-- Hero or Banner with user welcome and logout moved here -->
        <section class="banner banner-custom">
          <img
            class="happy"
            src="picturesinthecode/smilelogo.jpg"
            alt="Happy Banner"
          />
          <!-- User info container -->
          <div id="user-banner" style="font-weight: bold;"></div>
        </section>
      </div>
    </section>
    <!-- Main Content -->
    <main class="main-content">
      <h1>Cart Items</h1>
      <p class="text-content"></p>

      <!-- Cart Section -->
      <div class="cart-section" id="cart-items"></div>

      <!-- Total -->
      <div id="cart-total">Total: Rs. 0</div>

      <!-- Checkout Form -->
      <h1>Checkout</h1>
      <form id="checkout-form">
        <label for="full-name">Full Name:</label>
        <input type="text" id="full-name" required />

        <label for="address">Address:</label>
        <textarea id="address" required></textarea>

        <label for="payment-method">Payment Method:</label>
        <select id="payment-method" required>
          <option value="Cash on Delivery">Cash on Delivery</option>
          <option value="Online Payment">Online Payment</option>
        </select>

        <button type="submit">Place Order</button>
      </form>

      <p id="order-status"></p>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <strong>Order and Inquiry</strong><br /><br />
      9841190764<br /><br /><br />
      <strong>Follow us</strong>
      <div class="social-icons">
        <a href="https://facebook.com" target="_blank">
          <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/facebook.svg" alt="Facebook Icon" />
        </a>
        <a href="https://instagram.com" target="_blank">
          <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/instagram.svg" alt="Instagram Icon" />
        </a>
      </div>
    </footer>

    <script src="main.js"></script>
  </body>
</html>
